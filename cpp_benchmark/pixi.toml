[workspace]
name = "cpp-benchmark"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
cmake = ">=3.27"
ninja = ">=1.11"
boost-cpp = ">=1.84"
eigen = ">=3.4"
fmt = ">=10.2"
spdlog = ">=1.12"
nlohmann_json = ">=3.11"
abseil-cpp = "*"
range-v3 = ">=0.12"

[tasks]
cmake-gen     = { cmd = "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON", description = "Configure CMake (no cache)" }
build         = { cmd = "cmake --build build --parallel", description = "Compile the benchmark app" }
